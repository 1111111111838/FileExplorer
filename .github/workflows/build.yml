name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tee build_output.txt
          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
        continue-on-error: true
      - name: Show errors
        run: grep -E "error:|Error|FAILED|Exception" build_output.txt | head -30 || true
      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
      - name: Check APK
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK_EXISTS=true" >> $GITHUB_ENV
            echo "APK found!"
          else
            echo "APK_EXISTS=false" >> $GITHUB_ENV
            echo "No APK"
          fi
      - name: Upload APK
        if: env.APK_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: FileExplorer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: Create Release
        if: env.APK_EXISTS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "APK Build ${{ github.run_number }}"
          body: "APK ready!"
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
