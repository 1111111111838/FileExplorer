name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build and capture output
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug > build_stdout.txt 2> build_stderr.txt
          BUILD_EXIT=$?
          echo "Exit code: $BUILD_EXIT"
          echo "=== STDOUT ===" && cat build_stdout.txt
          echo "=== STDERR ===" && cat build_stderr.txt
          echo "=== APK search ===" && find . -name "*.apk" 2>/dev/null
          exit $BUILD_EXIT
        continue-on-error: true
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_stdout.txt
            build_stderr.txt
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FileExplorer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore
